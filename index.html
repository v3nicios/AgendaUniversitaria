<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unigenda - Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-card">
        
        <div class="banner">
    <div class="glitch-wrapper">
        <img src="/images/uni.svg" alt="Unigenda Logo" class="logo-glitch blue">
        <img src="/images/uni.svg" alt="Unigenda Logo" class="logo-glitch red">
        <img src="/images/uni.svg" alt="Unigenda Logo" class="logo-glitch main">
    </div>
    <h2>Unigenda</h2>
</div>
        <form id="login-form">
            <input type="email" id="email" placeholder="E-mail universitário" required>
            <input type="password" id="password" placeholder="Senha" required>
            
            <button type="submit">Entrar</button>
        </form>
    </div>

</body>
</html>
